<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carro em Dia - IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">
    <div class="max-w-md mx-auto p-6">
        <header class="text-center py-8">
            <h1 class="text-3xl font-bold text-yellow-500">🚗 Meu Carro em Dia</h1>
            <p class="text-gray-400">Manutenção Inteligente</p>
        </header>

        <div id="setup-form" class="space-y-4 bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <div>
                <label class="block text-sm mb-1 text-gray-300">Modelo e Ano</label>
                <input id="car-model" type="text" placeholder="Ex: Onix 2022" class="w-full p-3 rounded bg-gray-700 border-none focus:ring-2 focus:ring-yellow-500">
            </div>
            <div>
                <label class="block text-sm mb-1 text-gray-300">Quilometragem</label>
                <input id="car-km" type="number" placeholder="Ex: 35000" class="w-full p-3 rounded bg-gray-700 border-none focus:ring-2 focus:ring-yellow-500">
            </div>
            <button onclick="checkMaintenance()" id="btn-check" class="w-full bg-yellow-600 hover:bg-yellow-500 p-3 rounded-lg font-bold transition">
                Verificar Saúde do Carro
            </button>
        </div>

        <div id="result" class="mt-6 hidden p-5 bg-gray-800 rounded-xl border-l-4 border-yellow-500 shadow-xl">
            <h3 class="font-bold text-yellow-500 mb-2">Relatório da IA:</h3>
            <p id="ai-response" class="text-sm leading-relaxed text-gray-200 whitespace-pre-wrap"></p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        window.checkMaintenance = async function() {
            const model = document.getElementById('car-model').value;
            const km = document.getElementById('car-km').value;
            const btn = document.getElementById('btn-check');
            const resultDiv = document.getElementById('result');
            const responseP = document.getElementById('ai-response');

            if(!model || !km) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // AVISO: Em um app real, usamos o backend (Vercel) para esconder a chave.
            // Para teste rápido, vamos usar um prompt para pedir a chave ou você pode colar aqui.
            const API_KEY = prompt("Cole sua API Key do Google AI Studio aqui para testar:");

            if(!API_KEY) return;

            btn.innerText = "Consultando Manual Virtual...";
            btn.disabled = true;
            resultDiv.classList.remove('hidden');
            responseP.innerText = "Processando...";

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const aiModel = genAI.getGenerativeModel({ model: "gemini-pro" });

                const promptText = `Meu carro é um ${model} com ${km} km rodados. Com base nas suas instruções de especialista, o que devo revisar agora? Gere um relatório curto e um JSON de status.`;

                const result = await aiModel.generateContent(promptText);
                const response = await result.response;
                responseP.innerText = response.text();
            } catch (error) {
                responseP.innerText = "Erro ao consultar a IA: " + error.message;
            } finally {
                btn.innerText = "Verificar Saúde do Carro";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
